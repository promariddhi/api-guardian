services:
  gateway:
    build: .
    env_file:
      - .env
    volumes:
      - ./configs/gateway.yaml:/app/configs/gateway.yaml:ro
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      - redis

  redis:
    image: redis:8-alpine
    volumes:
      - redis-data:/data

  prometheus:
    image: prom/prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  redis-data: